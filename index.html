<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Live2D Companion</title>
  <!-- Load PIXI.js -->
  <script src="js/pixi.min.js"
    onerror="window.addEventListener('DOMContentLoaded', () => { document.body.innerHTML='<div style=color:red;padding:20px>ERROR: Failed to load local PIXI.js library. Make sure js/pixi.min.js exists.</div>'; })"></script>
  <!-- Load Cubism Core -->
  <script src="js/live2dcubismcore.min.js"
    onerror="console.error('Failed to load local Cubism Core library')"></script>
  <!-- Load pixi-live2d-display Cubism 4 runtime -->

  <!-- Load Google Font Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; background: transparent; user-select: none; -webkit-user-select: none; }
    @keyframes scifi-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes scifi-spin-reverse { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes border-glow-breathe { 0%, 100% { filter: drop-shadow(0 0 6px rgba(0, 240, 255, 0.3)); } 50% { filter: drop-shadow(0 0 14px rgba(0, 240, 255, 0.6)); } }
    @keyframes scanline-sweep { 0% { transform: translateX(-100%); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateX(200%); opacity: 0; } }
    @keyframes neon-text-pulse { 0%, 100% { text-shadow: 0 0 4px rgba(0, 240, 255, 0.5); } 50% { text-shadow: 0 0 10px rgba(0, 240, 255, 0.9), 0 0 20px rgba(0, 240, 255, 0.3); } }
    @keyframes hud-glitch { 0% { opacity: 0.3; transform: translate(2px, -2px) skewX(5deg); filter: brightness(2) contrast(1.5) hue-rotate(90deg); } 20% { opacity: 0.8; transform: translate(-2px, 2px) skewX(-5deg); } 40% { opacity: 0.5; transform: translate(1px, -1px) skewX(2deg); filter: brightness(1.2) contrast(1.1) hue-rotate(0deg); } 60% { opacity: 1; transform: translate(0, 0) scale(1.02); } 80% { opacity: 0.9; transform: translate(-1px, 1px) skewX(-2deg); } 100% { opacity: 1; transform: translate(0, 0) scale(1); } }
    @keyframes aura-particle-drift { 0%, 100% { box-shadow: 0 0 10px var(--vibe-color, rgba(0, 240, 255, 0.3)), inset 0 0 5px var(--vibe-color, rgba(0, 240, 255, 0.2)); } 33% { box-shadow: 0 0 16px var(--vibe-color, rgba(0, 240, 255, 0.5)), inset 0 0 8px var(--vibe-color, rgba(0, 240, 255, 0.3)), 3px -3px 6px rgba(0, 240, 255, 0.15); } 66% { box-shadow: 0 0 12px var(--vibe-color, rgba(0, 240, 255, 0.4)), inset 0 0 6px var(--vibe-color, rgba(0, 240, 255, 0.25)), -3px 3px 6px rgba(0, 200, 255, 0.1); } }
    @keyframes slide-up-in { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    @keyframes slide-down-out { from { transform: translateX(-50%) translateY(0); opacity: 1; } to { transform: translateX(-50%) translateY(20px); opacity: 0; } }
    @keyframes scan-anim { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    @keyframes pulse-anim { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    canvas { width: 100vw; height: 100vh; display: block; filter: sepia(1) hue-rotate(185deg) saturate(5) brightness(0.95) contrast(1.1) drop-shadow(0 0 10px rgba(0, 240, 255, 0.6)); opacity: 0.82; -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%); mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%); }

    #speech-container { position: relative; width: 100%; max-height: 220px; display: flex; flex-direction: column; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); overflow: visible; background: transparent; box-shadow: none; border: none; clip-path: none; filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.4)); animation: border-glow-breathe 4s ease-in-out infinite; }
    #speech-card { width: 100%; height: 100%; box-sizing: border-box; background: linear-gradient(135deg, var(--vibe-color, rgba(0, 240, 255, 0.85)), rgba(0, 120, 255, 0.35)); padding: 1.5px; clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px)); transition: background 0.6s ease; }
    #speech-inner { width: 100%; height: 100%; box-sizing: border-box; background: rgba(4, 10, 18, 0.96); backdrop-filter: blur(12px) saturate(1.4); -webkit-backdrop-filter: blur(12px) saturate(1.4); padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; -ms-overflow-style: none; clip-path: polygon(0 0, calc(100% - 15.5px) 0, 100% 15.5px, 100% 100%, 15.5px 100%, 0 calc(100% - 15.5px)); box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.12); position: relative; overflow: hidden; }
    #speech-inner::after { content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.06), transparent); animation: scanline-sweep 6s ease-in-out infinite; pointer-events: none; }
    #speech-inner::-webkit-scrollbar { display: none; }
    #speech-container.visible { opacity: 1; pointer-events: auto; }
    #speech-container.compact { width: auto; max-width: 180px; }
    #speech-container.compact #speech-card { clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); }
    #speech-container.compact #speech-inner { padding: 5px 10px; clip-path: polygon(0 0, calc(100% - 10.5px) 0, 100% 10.5px, 100% 100%, 10.5px 100%, 0 calc(100% - 10.5px)); }
    #speech-container.compact #speech-header { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    #speech-container.compact #speech-status, #speech-container.compact #speech-text { display: none !important; }

    #speech-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid rgba(0, 240, 255, 0.3); padding-bottom: 5px; margin-bottom: 3px; position: relative; }
    #speech-vibe-container { display: flex; align-items: center; gap: 6px; }
    #speech-icon { display: flex; align-items: center; justify-content: center; }
    #speech-icon svg { width: 14px; height: 14px; fill: none; stroke: var(--vibe-color, #00f0ff); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 3px var(--vibe-color, #00f0ff)); transition: stroke 0.4s ease, filter 0.4s ease; }
    #speech-vibe { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #00f0ff; font-weight: 700; font-family: 'Courier New', Courier, monospace; text-shadow: 0 0 5px rgba(0, 240, 255, 0.6); animation: neon-text-pulse 3s ease-in-out infinite; }
    #speech-status { font-size: 9px; letter-spacing: 0.8px; color: #00f0ff; font-weight: 800; font-family: 'Courier New', Courier, monospace; }
    #speech-text { font-size: 12px; line-height: 1.45; color: #e0f7fc; font-weight: 500; font-family: 'Inter', system-ui, -apple-system, sans-serif; word-wrap: break-word; text-shadow: 0 0 2px rgba(224, 247, 252, 0.3); }

    #prompt-toggle-btn { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; border: 1px solid rgba(0, 240, 255, 0.4); border-radius: 4px; background: rgba(0, 240, 255, 0.08); cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0; margin-left: 6px; }
    #prompt-toggle-btn:hover { background: rgba(0, 240, 255, 0.2); border-color: rgba(0, 240, 255, 0.8); transform: scale(1.12); box-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
    #prompt-toggle-btn:active { transform: scale(0.95); }
    #prompt-toggle-btn.active { background: rgba(0, 240, 255, 0.25); border-color: #00f0ff; box-shadow: 0 0 8px rgba(0, 240, 255, 0.5); }
    #prompt-toggle-btn svg { width: 13px; height: 13px; fill: none; stroke: #00f0ff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 2px #00f0ff); }

    #speech-loader { display: none; align-items: center; justify-content: center; padding: 12px 0; width: 100%; }
    #speech-loader svg { width: 28px; height: 28px; animation: scifi-spin 2s linear infinite; transform-origin: center; filter: drop-shadow(0 0 5px var(--vibe-color, #00f0ff)); }

    #audio-aura { position: absolute; left: calc(100% + 22px); top: 36px; transform: translate(-50%, -50%) scale(0.8); width: 16px; height: 16px; border-radius: 50%; background: radial-gradient(circle, rgba(0, 240, 255, 0.6) 0%, rgba(0, 240, 255, 0.1) 60%, transparent 80%); border: 1px solid var(--vibe-color, rgba(0, 240, 255, 0.4)); animation: aura-particle-drift 3s ease-in-out infinite; pointer-events: none; z-index: 1006; opacity: 0; transition: transform 0.08s cubic-bezier(0.1, 0.8, 0.3, 1), opacity 0.1s ease; }
    #speech-pointer { position: absolute; left: 100%; top: 18px; transform: translateY(-50%); pointer-events: none; overflow: visible; z-index: 1005; }

    #left-hud { position: absolute; left: calc(50% - 370px); top: 24px; width: 250px; max-width: 250px; display: flex; flex-direction: column; gap: 18px; z-index: 1000; pointer-events: none; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease; }
    #right-hud { position: absolute; right: calc(50% - 370px); top: 24px; width: 250px; max-width: 250px; display: flex; flex-direction: column; gap: 18px; z-index: 1000; pointer-events: none; transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease; }
    #left-hud.speaking-push { transform: translateX(-40px); opacity: 0.6; }
    #right-hud.speaking-push { transform: translateX(40px); opacity: 0.6; }
    #left-hud.speaking-push:hover, #right-hud.speaking-push:hover { opacity: 1; }
    #left-hud .hud-box:hover { transform: translateX(-15px) scale(1.02); filter: drop-shadow(0 0 18px rgba(0, 240, 255, 0.6)); }
    #right-hud .hud-box:hover { transform: translateX(15px) scale(1.02); filter: drop-shadow(0 0 18px rgba(0, 240, 255, 0.6)); }

    .hud-box { width: 100%; opacity: 0; pointer-events: none; transform: translateY(10px) scale(0.98); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); filter: drop-shadow(0 0 8px rgba(0, 240, 255, 0.35)); }
    .hud-box.visible { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
    .hud-box.active-glitch { animation: hud-glitch 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
    .hud-card { width: 100%; box-sizing: border-box; background: linear-gradient(135deg, var(--vibe-color, rgba(0, 240, 255, 0.85)), rgba(0, 120, 255, 0.35)); padding: 1.5px; clip-path: polygon(0 0, calc(100% - 15px) 0, 100% 15px, 100% 100%, 15px 100%, 0 calc(100% - 15px)); transition: background 0.5s ease; }
    .hud-inner { width: 100%; box-sizing: border-box; background: rgba(8, 20, 32, 0.82); backdrop-filter: blur(10px) saturate(1.3); -webkit-backdrop-filter: blur(10px) saturate(1.3); padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; clip-path: polygon(0 0, calc(100% - 15.5px) 0, 100% 15.5px, 100% 100%, 15.5px 100%, 0 calc(100% - 15.5px)); box-shadow: inset 0 0 14px rgba(0, 240, 255, 0.12); position: relative; overflow: hidden; }
    .hud-inner::after { content: ''; position: absolute; top: 0; left: 0; width: 35%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.04), transparent); animation: scanline-sweep 8s ease-in-out infinite; pointer-events: none; }
    .hud-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid rgba(0, 240, 255, 0.3); padding-bottom: 5px; margin-bottom: 2px; gap: 12px; }
    .hud-title-container { display: flex; align-items: center; gap: 4px; }
    .hud-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #00f0ff; font-weight: 700; font-family: 'Courier New', Courier, monospace; text-shadow: 0 0 5px rgba(0, 240, 255, 0.6); animation: neon-text-pulse 4s ease-in-out infinite; }
    .hud-status { font-size: 9px; letter-spacing: 0.8px; color: #00f0ff; font-weight: 800; font-family: 'Courier New', Courier, monospace; margin-left: auto; transition: color 0.4s ease; }

    .hud-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; transition: box-shadow 0.3s ease; }
    .hud-dot.red { background-color: #ff3b30; box-shadow: 0 0 6px #ff3b30; }
    .hud-dot.yellow { background-color: #ffcc00; box-shadow: 0 0 6px #ffcc00; }
    .hud-dot.green { background-color: #34c759; box-shadow: 0 0 6px #34c759; }

    .image-carousel { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 5px; scrollbar-width: none; -ms-overflow-style: none; }
    .image-carousel::-webkit-scrollbar { display: none; }
    .image-card { flex: 0 0 130px; height: 110px; border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 4px; overflow: hidden; position: relative; display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.4); transition: border-color 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease; }
    .image-card:hover { border-color: rgba(0, 240, 255, 0.9); transform: translateY(-4px); box-shadow: 0 0 15px rgba(0, 240, 255, 0.5); z-index: 100; }
    .image-card img { width: 100%; height: 82px; object-fit: cover; border-bottom: 1px solid rgba(0, 240, 255, 0.2); }
    .image-card-title { font-size: 8px; color: #e0f7fc; padding: 2px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Inter', sans-serif; }
    .image-card-resolution { position: absolute; top: 4px; right: 4px; background: rgba(8, 20, 32, 0.85); border: 0.5px solid rgba(0, 240, 255, 0.5); font-size: 7px; color: #00f0ff; padding: 1px 3px; border-radius: 2px; font-family: monospace; }

    .screen-preview-container { position: relative; width: 100%; height: 120px; border: 1px solid rgba(0, 240, 255, 0.4); border-radius: 4px; overflow: hidden; background: #000; transition: border-color 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease; transform-origin: center; }
    .screen-preview-container:hover { border-color: rgba(0, 240, 255, 0.9); transform: scale(1.25) translateY(-5px); box-shadow: 0 0 25px rgba(0, 240, 255, 0.7); z-index: 100; }

    .terminal-box { width: 100%; max-height: 100px; overflow-y: auto; font-family: 'Courier New', Courier, monospace; font-size: 9px; line-height: 1.3; padding: 6px; background: rgba(0, 5, 10, 0.5); border: 1px solid rgba(0, 240, 255, 0.2); border-radius: 4px; box-shadow: inset 0 0 8px rgba(0, 240, 255, 0.08); scrollbar-width: none; -ms-overflow-style: none; }
    .terminal-box::-webkit-scrollbar { display: none; }
    .terminal-line { word-break: break-all; margin-bottom: 2px; }
    .terminal-line.cyan { color: #00f0ff; text-shadow: 0 0 3px rgba(0, 240, 255, 0.5); }
    .terminal-line.cyan-dim { color: rgba(0, 240, 255, 0.6); }
    .terminal-line.green { color: #34c759; text-shadow: 0 0 3px rgba(52, 199, 89, 0.5); }
    .terminal-line.yellow { color: #ffcc00; text-shadow: 0 0 3px rgba(255, 204, 0, 0.5); }
    .terminal-line.red { color: #ff3b30; text-shadow: 0 0 3px rgba(255, 59, 48, 0.5); }

    .search-results-list { display: flex; flex-direction: column; gap: 6px; max-height: 250px; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
    .search-results-list::-webkit-scrollbar { display: none; }
    .search-item { display: flex; flex-direction: column; gap: 2px; padding: 6px 8px; border: 1px solid rgba(0, 240, 255, 0.15); background: rgba(0, 5, 10, 0.3); border-radius: 4px; transition: border-color 0.25s ease, background 0.25s ease, transform 0.25s ease; }
    .search-item:hover { border-color: rgba(0, 240, 255, 0.5); background: rgba(0, 10, 20, 0.5); transform: translateX(3px); }
    .search-item-header { display: flex; align-items: center; gap: 6px; }
    .search-item-icon { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .search-item-icon svg { width: 12px; height: 12px; fill: none; stroke: #00f0ff; stroke-width: 2; }
    .search-item-title { font-size: 10px; font-weight: 600; color: #00f0ff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Inter', sans-serif; }
    .search-item-snippet { font-size: 8px; color: rgba(224, 247, 252, 0.7); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; font-family: 'Inter', sans-serif; }
    .search-item-domain { font-size: 7px; color: rgba(0, 240, 255, 0.5); font-family: monospace; text-align: right; margin-top: 1px; }

    #prompt-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 420px; max-width: 90vw; z-index: 2000; pointer-events: auto; display: none; filter: drop-shadow(0 0 12px rgba(0, 240, 255, 0.4)); }
    #prompt-container.visible { display: block; animation: slide-up-in 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
    #prompt-container.hiding { animation: slide-down-out 0.25s cubic-bezier(0.7, 0, 0.84, 0) both; }
    #prompt-card { width: 100%; box-sizing: border-box; background: linear-gradient(135deg, rgba(0, 240, 255, 0.75), rgba(0, 120, 255, 0.3)); padding: 1.5px; clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px)); }
    #prompt-inner { width: 100%; box-sizing: border-box; background: rgba(4, 10, 18, 0.96); backdrop-filter: blur(16px) saturate(1.5); -webkit-backdrop-filter: blur(16px) saturate(1.5); padding: 10px 14px; display: flex; align-items: center; gap: 10px; clip-path: polygon(0 0, calc(100% - 12.5px) 0, 100% 12.5px, 100% 100%, 12.5px 100%, 0 calc(100% - 12.5px)); box-shadow: inset 0 0 12px rgba(0, 240, 255, 0.1); }
    #prompt-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(0, 240, 255, 0.5); font-family: 'Courier New', monospace; font-weight: 700; flex-shrink: 0; }
    #prompt-input { flex: 1; background: rgba(0, 15, 25, 0.6); border: 1px solid rgba(0, 240, 255, 0.3); border-radius: 4px; color: #e0f7fc; font-size: 12px; font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 500; padding: 8px 12px; outline: none; transition: border-color 0.3s ease, box-shadow 0.3s ease; caret-color: #00f0ff; }
    #prompt-input::placeholder { color: rgba(0, 240, 255, 0.35); font-style: italic; }
    #prompt-input:focus { border-color: rgba(0, 240, 255, 0.7); box-shadow: 0 0 8px rgba(0, 240, 255, 0.2), inset 0 0 6px rgba(0, 240, 255, 0.08); }
    #prompt-send-btn { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid rgba(0, 240, 255, 0.5); border-radius: 4px; background: rgba(0, 240, 255, 0.1); cursor: pointer; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); flex-shrink: 0; }
    #prompt-send-btn:hover { background: rgba(0, 240, 255, 0.25); border-color: #00f0ff; transform: scale(1.1); box-shadow: 0 0 14px rgba(0, 240, 255, 0.5); }
    #prompt-send-btn:active { transform: scale(0.92); }
    #prompt-send-btn svg { width: 16px; height: 16px; fill: none; stroke: #00f0ff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 3px #00f0ff); }

    #large-image-preview {
      position: fixed;
      bottom: 95px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      width: 380px;
      max-width: 90vw;
      z-index: 3000;

  <script>
    const app = new PIXI.Application({
      view: document.getElementById('canvas'),
      transparent: true,
      autoStart: true,
      resizeTo: window
    });

    let live2dModel;
    let currentEmotion = "idle";
    let currentState = "LISTENING";
    let currentMouth = 0.0;
    let currentMicRMS = 0.0;
    let auraRenderedScale = 0.8;
    let auraRenderedOpacity = 0.0;
    let startledActive = false;
    let hudAutoDismissTimeout = null;

    // Define core target parameters in the global scope so they are shared
    let targetEyeOpenL = 1.0;
    let targetEyeOpenR = 1.0;
    let targetEyeSmileL = 0.0;
    let targetEyeSmileR = 0.0;
    let targetBrowLY = 0.0;
    let targetBrowRY = 0.0;
    let targetBrowLX = 0.0;
    let targetBrowRX = 0.0;
    let targetBrowLAngleL = 0.0;
    let targetBrowLAngleR = 0.0;
    let targetBrowLForm = 0.0;
    let targetBrowRForm = 0.0;
    let targetCheek = 0.0;
    let targetTear = 0.0;
    let targetAngleZ = 0.0;
    let targetMouthForm = 0.0;
    let targetMouthOpenScale = 1.0;

    // Define active rendered expression values for smooth independent blending (motion-immune)
    let currentRenderedBrowLY = 0.0;
    let currentRenderedBrowRY = 0.0;
    let currentRenderedBrowLX = 0.0;
    let currentRenderedBrowRX = 0.0;
    let currentRenderedBrowLAngleL = 0.0;
    let currentRenderedBrowLAngleR = 0.0;
    let currentRenderedBrowLForm = 0.0;
    let currentRenderedBrowRForm = 0.0;
    let currentRenderedCheek = 0.0;
    let currentRenderedEyeLSmile = 0.0;
    let currentRenderedEyeRSmile = 0.0;
    let currentRenderedMouthForm = 0.5;

    // Load scale and y-position dynamically from standard config
    let scaleVal = 0.32;
    let yOffset = -120;

    async function init() {
      try {
        // Load the config file of the self-contained Hiyori model with autoUpdate disabled
        live2dModel = await PIXI.live2d.Live2DModel.from('live2d_model/hiyori_pro_t11.model3.json', { autoUpdate: false });
        app.stage.addChild(live2dModel);
        window.live2dModel = live2dModel; // Expose to window for debugger inspects

        // Apply custom high-tech scanline shader/filter
        const scanlineFragment = `
          precision mediump float;
          varying vec2 vTextureCoord;
          uniform sampler2D uSampler;
          void main(void) {
            vec4 color = texture2D(uSampler, vTextureCoord);
            if (color.a > 0.0) {
              // High-frequency subtle horizontal scanlines
              float scanline = sin(vTextureCoord.y * 1000.0) * 0.08;
              color.rgb = color.rgb - vec3(scanline);
            }
            gl_FragColor = color;
          }
        `;
        const scanlineFilter = new PIXI.Filter(undefined, scanlineFragment);
        live2dModel.filters = [scanlineFilter];

        // Adjust dimensions to show only the face
        live2dModel.scale.set(scaleVal); 
        live2dModel.x = window.innerWidth / 2 - (live2dModel.width / 2);
        live2dModel.y = yOffset;

        app.stage.interactive = true;
        app.stage.on('pointermove', (event) => {
          if (live2dModel && currentState !== 'THINKING') {
            live2dModel.focus(event.data.global.x, event.data.global.y);
          }
        });

        // Setup reactive sentiment parameter variables and overrides
        targetEyeOpenL = 1.0;
        targetEyeOpenR = 1.0;
        targetEyeSmileL = 0.0;
        targetEyeSmileR = 0.0;
        targetBrowLY = 0.0;
        targetBrowRY = 0.0;
        targetBrowLX = 0.0;
        targetBrowRX = 0.0;
        targetBrowLAngleL = 0.0;
        targetBrowLAngleR = 0.0;
        targetBrowLForm = 0.0;
        targetBrowRForm = 0.0;
        targetCheek = 0.0;
        targetTear = 0.0;
        targetAngleZ = 0.0;
        targetMouthForm = 0.0;
        targetMouthOpenScale = 1.0;

        const core = live2dModel.internalModel.coreModel;

        // Retrieve parameter indices once at startup for high-performance updates
        const eyeLIdx = core.getParameterIndex('ParamEyeLOpen');
        const eyeRIdx = core.getParameterIndex('ParamEyeROpen');
        const browLYIdx = core.getParameterIndex('ParamBrowLY');
        const browRYIdx = core.getParameterIndex('ParamBrowRY');
        const browLXIdx = core.getParameterIndex('ParamBrowLX');
        const browRXIdx = core.getParameterIndex('ParamBrowRX');
        const angleZIdx = core.getParameterIndex('ParamAngleZ');
        const mouthFormIdx = core.getParameterIndex('ParamMouthForm');
        const mouthOpenIdx = core.getParameterIndex('ParamMouthOpenY');
        
        const angleYIdx = core.getParameterIndex('ParamAngleY');
        const eyeballXIdx = core.getParameterIndex('ParamEyeBallX');
        const eyeballYIdx = core.getParameterIndex('ParamEyeBallY');

        let cheekIdx = -1;
        try { cheekIdx = core.getParameterIndex('ParamCheek'); } catch(e){}

        let eyeLSmileIdx = -1, eyeRSmileIdx = -1;
        let browLAngIdx = -1, browRAngIdx = -1;
        let browLFormIdx = -1, browRFormIdx = -1;
        try { eyeLSmileIdx = core.getParameterIndex('ParamEyeLSmile'); } catch(e){}
        try { eyeRSmileIdx = core.getParameterIndex('ParamEyeRSmile'); } catch(e){}
        try { browLAngIdx = core.getParameterIndex('ParamBrowLAngle'); } catch(e){}
        try { browRAngIdx = core.getParameterIndex('ParamBrowRAngle'); } catch(e){}
        try { browLFormIdx = core.getParameterIndex('ParamBrowLForm'); } catch(e){}
        try { browRFormIdx = core.getParameterIndex('ParamBrowRForm'); } catch(e){}

        let lastSpeakingMotionTime = 0;

        // Perform all model updates and overrides manually inside PIXI Ticker
        // This runs after default updates but before rendering, completely preventing clobbering!
        app.ticker.add(() => {
          if (!live2dModel) return;

          // 1. Manually update the model's active motions, animations, and physics
          live2dModel.update(app.ticker.elapsedMS);

          // 2. Periodic speaking gesture trigger
          if (currentState === 'SPEAKING') {
            let now = Date.now();
            if (now - lastSpeakingMotionTime > 4000) {
              lastSpeakingMotionTime = now;
              if (currentEmotion !== 'angry' && currentEmotion !== 'sad' && currentEmotion !== 'bored' && currentEmotion !== 'error') {
                let idx = Math.random() > 0.5 ? 0 : 1;
                live2dModel.motion('Tap', idx, 2); // Gesturing hands dynamically
              }
            }
          }

          // 3. Core State-driven Overrides
          let eyeballXOverride = null;
          let eyeballYOverride = null;
          let angleYOverride = null;

          if (currentState === 'LISTENING') {
            // Nodding vertical head movement
            let time = Date.now() / 250;
            angleYOverride = Math.sin(time) * 4.0; 
          } else if (currentState === 'THINKING') {
            // Think look: upward tilt, drift eyeballs top-left
            angleYOverride = 6.0;
            eyeballXOverride = -0.5;
            eyeballYOverride = 0.5;
          }

          // 4. Interruption Startled Override
          if (startledActive) {
            targetEyeOpenL = 1.4;
            targetEyeOpenR = 1.4;
            targetEyeSmileL = 0.0;
            targetEyeSmileR = 0.0;
            targetBrowLY = 0.4;
            targetBrowRY = 0.4;
            targetBrowLX = 0.0;
            targetBrowRX = 0.0;
            targetBrowLAngleL = 0.0;
            targetBrowLAngleR = 0.0;
            targetBrowLForm = 0.0;
            targetBrowRForm = 0.0;
            targetMouthForm = 0.0;
            window.setEmotion('confused');
          } else {
            // 5. Sentiment / Emotion Baseline Target Mapping
            if (currentEmotion === 'sleeping') {
              targetEyeOpenL = 0.0;
              targetEyeOpenR = 0.0;
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else if (currentEmotion === 'bored') {
              // Bored/scoffing unimpressed look: half-closed eyes, down-turned mouth, raised skeptical brow
              targetEyeOpenL = 0.65;
              targetEyeOpenR = 0.65;
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else {
              targetEyeOpenL = 1.0;
              targetEyeOpenR = 1.0;
            }

            if (currentEmotion === 'angry' || currentEmotion === 'error' || currentEmotion === 'overheat') {
              targetBrowLY = -0.8;
              targetBrowRY = -0.8;
              targetBrowLX = -0.5;
              targetBrowRX = 0.5;
              targetBrowLAngleL = -0.8;
              targetBrowLAngleR = 0.8;
              targetBrowLForm = -0.8;
              targetBrowRForm = -0.8;
              targetMouthForm = -1.0;
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else if (currentEmotion === 'sad') {
              targetBrowLY = 0.6;
              targetBrowRY = 0.6;
              targetBrowLX = 0.2;
              targetBrowRX = -0.2;
              targetBrowLAngleL = 0.8;
              targetBrowLAngleR = -0.8;
              targetBrowLForm = 0.8;
              targetBrowRForm = 0.8;
              targetMouthForm = -1.0;
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else if (currentEmotion === 'smug' || currentEmotion === 'vibing') {
              // Arrogant Smug Smirk expression: cynical half-closed eyes, raised skeptical brows, sarcastic smirk!
              targetEyeOpenL = 0.75;
              targetEyeOpenR = 0.75;
              targetEyeSmileL = 0.4;
              targetEyeSmileR = 0.4;
              targetBrowLY = 0.55;       // Left brow raised skeptically
              targetBrowRY = -0.35;      // Right brow lowered skeptically
              targetBrowLX = -0.2;
              targetBrowRX = 0.2;
              targetBrowLAngleL = 0.5;
              targetBrowLAngleR = -0.5;
              targetBrowLForm = 0.0;
              targetBrowRForm = 0.0;
              targetMouthForm = 0.8;      // smug smirk mouth shape
            } else if (currentEmotion === 'confused' || currentEmotion === 'suspicious') {
              targetBrowLY = 0.6;
              targetBrowRY = -0.6;
              targetBrowLX = 0.0;
              targetBrowRX = 0.0;
              targetBrowLAngleL = 0.5;
              targetBrowLAngleR = -0.5;
              targetBrowLForm = 0.0;
              targetBrowRForm = 0.0;
              targetMouthForm = -0.2;
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else if (currentEmotion === 'bored') {
              targetBrowLY = 0.45;
              targetBrowRY = 0.45;
              targetBrowLX = 0.0;
              targetBrowRX = 0.0;
              targetBrowLAngleL = 0.3;
              targetBrowLAngleR = -0.3;
              targetBrowLForm = 0.3;
              targetBrowRForm = 0.3;
              targetMouthForm = -0.6; // scoffing frown
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else if (currentEmotion === 'listening') {
              targetBrowLY = 0.25;
              targetBrowRY = 0.25;
              targetBrowLX = 0.0;
              targetBrowRX = 0.0;
              targetBrowLAngleL = 0.0;
              targetBrowLAngleR = 0.0;
              targetBrowLForm = 0.0;
              targetBrowRForm = 0.0;
              targetMouthForm = 0.1; // cold neutral mouth form
              targetEyeSmileL = 0.0;
              targetEyeSmileR = 0.0;
            } else {
              if (currentState === 'SPEAKING') {
                // Default Rowdy Thirunelveli talking face: slightly frowning and cynical!
                targetBrowLY = -0.35;
                targetBrowRY = -0.35;
                targetBrowLX = -0.2;
                targetBrowRX = 0.2;
                targetBrowLAngleL = -0.4;
                targetBrowLAngleR = 0.4;
                targetBrowLForm = -0.4;
                targetBrowRForm = -0.4;
                targetMouthForm = -0.3; // intense/slightly annoyed speaking shape
                targetEyeSmileL = 0.0;
                targetEyeSmileR = 0.0;
              } else {
                targetBrowLY = 0.0;
                targetBrowRY = 0.0;
                targetBrowLX = 0.0;
                targetBrowRX = 0.0;
                targetBrowLAngleL = 0.0;
                targetBrowLAngleR = 0.0;
                targetBrowLForm = 0.0;
                targetBrowRForm = 0.0;
                targetMouthForm = 0.1; // cold neutral mouth form
                targetEyeSmileL = 0.0;
                targetEyeSmileR = 0.0;
              }
            }
          }

          // 6. Vocal-Stress Eyebrow Elevation (Volume triggers emphasis brow lift)
          let browStress = 0.0;
          if (currentMouth > 0.65) {
            browStress = (currentMouth - 0.65) * 0.6;
          }

          // 7. Buttery Smooth Sentiment/Parameter Blending (Linear Interpolation - Motion-Immune)
          let blendFactor = 0.15; 
          
          let curZ = core.getParameterValueByIndex(angleZIdx);
          let blendZ = curZ + (targetAngleZ - curZ) * 0.08;

          // Perform smooth mathematical transitions completely independent of active motion files
          currentRenderedBrowLY += ((targetBrowLY + browStress) - currentRenderedBrowLY) * blendFactor;
          currentRenderedBrowRY += ((targetBrowRY + browStress) - currentRenderedBrowRY) * blendFactor;
          currentRenderedBrowLX += (targetBrowLX - currentRenderedBrowLX) * blendFactor;
          currentRenderedBrowRX += (targetBrowRX - currentRenderedBrowRX) * blendFactor;
          currentRenderedMouthForm += (targetMouthForm - currentRenderedMouthForm) * 0.2;
          
          let targetCheekVal = (currentEmotion === 'smug' || currentEmotion === 'vibing') ? 0.8 : 0.0;
          currentRenderedCheek += (targetCheekVal - currentRenderedCheek) * blendFactor;
          currentRenderedEyeLSmile += (targetEyeSmileL - currentRenderedEyeLSmile) * blendFactor;
          currentRenderedEyeRSmile += (targetEyeSmileR - currentRenderedEyeRSmile) * blendFactor;
          currentRenderedBrowLAngleL += (targetBrowLAngleL - currentRenderedBrowLAngleL) * blendFactor;
          currentRenderedBrowLAngleR += (targetBrowLAngleR - currentRenderedBrowLAngleR) * blendFactor;
          currentRenderedBrowLForm += (targetBrowLForm - currentRenderedBrowLForm) * blendFactor;
          currentRenderedBrowRForm += (targetBrowRForm - currentRenderedBrowRForm) * blendFactor;

          // Force our smooth blended expression states into model parameters
          core.setParameterValueByIndex(browLYIdx, currentRenderedBrowLY);
          core.setParameterValueByIndex(browRYIdx, currentRenderedBrowRY);
          core.setParameterValueByIndex(browLXIdx, currentRenderedBrowLX);
          core.setParameterValueByIndex(browRXIdx, currentRenderedBrowRX);
          core.setParameterValueByIndex(angleZIdx, blendZ);
          core.setParameterValueByIndex(mouthFormIdx, currentRenderedMouthForm);

          if (eyeLIdx >= 0 && eyeRIdx >= 0) {
            if (startledActive) {
              core.setParameterValueByIndex(eyeLIdx, 1.4);
              core.setParameterValueByIndex(eyeRIdx, 1.4);
            } else if (currentEmotion === 'sleeping') {
              core.setParameterValueByIndex(eyeLIdx, 0.0);
              core.setParameterValueByIndex(eyeRIdx, 0.0);
            }
            // Awake eyes blink naturally via PIXI Live2D's internal EyeBlink manager update
          }

          if (cheekIdx >= 0) {
            core.setParameterValueByIndex(cheekIdx, currentRenderedCheek);
          }
          if (eyeLSmileIdx >= 0) {
            core.setParameterValueByIndex(eyeLSmileIdx, currentRenderedEyeLSmile);
          }
          if (eyeRSmileIdx >= 0) {
            core.setParameterValueByIndex(eyeRSmileIdx, currentRenderedEyeRSmile);
          }
          if (browLAngIdx >= 0) {
            core.setParameterValueByIndex(browLAngIdx, currentRenderedBrowLAngleL);
          }
          if (browRAngIdx >= 0) {
            core.setParameterValueByIndex(browRAngIdx, currentRenderedBrowLAngleR);
          }
          if (browLFormIdx >= 0) {
            core.setParameterValueByIndex(browLFormIdx, currentRenderedBrowLForm);
          }
          if (browRFormIdx >= 0) {
            core.setParameterValueByIndex(browRFormIdx, currentRenderedBrowRForm);
          }

          // 8. Apply state-based parameter overrides
          if (angleYOverride !== null) {
            core.setParameterValueByIndex(angleYIdx, angleYOverride);
          }
          if (eyeballXOverride !== null) {
            core.setParameterValueByIndex(eyeballXIdx, eyeballXOverride);
          }
          if (eyeballYOverride !== null) {
            core.setParameterValueByIndex(eyeballYIdx, eyeballYOverride);
          }

          // 9. Apply lip sync volume adjusted by Viseme Scale
          let finalMouthOpen = currentMouth * targetMouthOpenScale;

        live2dModel.motion(grp, idx, 2);

        return null;
      }
    }

      const box = document.getElementById('terminal-box');
      box.innerHTML = ''; // Keep console feed clean by removing previous tasks' outputs
      
      const cmd = payload.command || "";
      const output = payload.output || "";
      const type = payload.type || "success";

      const dateStr = new Date().toLocaleTimeString();
      let colorClass = "cyan-dim";
      if (type === "error") colorClass = "red";
      else if (type === "warning") colorClass = "yellow";
      else if (type === "info") colorClass = "cyan";
      else if (type === "success") colorClass = "green";

      if (cmd) {
        const cmdLine = document.createElement('div');
        cmdLine.className = 'terminal-line cyan';
        cmdLine.textContent = `[${dateStr}] $ ${cmd}`;
        box.appendChild(cmdLine);
      }

      if (output) {
        const lines = output.split('\n');
        lines.forEach(line => {
          if (line.trim()) {
            const outLine = document.createElement('div');
            outLine.className = `terminal-line ${colorClass}`;
            outLine.textContent = line;
            box.appendChild(outLine);
          }
        });
      }

      box.scrollTop = box.scrollHeight;

      const hudBox = document.getElementById('terminal-hud');
      hudBox.classList.remove('active-glitch');
      void hudBox.offsetWidth; // Trigger reflow
      hudBox.classList.add('visible', 'active-glitch');

      if (hudStatus) hudStatus.textContent = "ONLINE";

        currentState = 'LISTENING';
        window.updateSpeechBubbleState();
      }, 1500);
      setTimeout(() => {
        startledActive = false;
      }, 1200);
    };

    // Adapt layout on window resize
    window.addEventListener('resize', () => {
      if (live2dModel) {
        live2dModel.x = window.innerWidth / 2 - (live2dModel.width / 2);
      }
    });

    // Helper to change parameters dynamically from Python (e.g. scale, y-offset)
    window.updateLayout = function(scale, y) {
      scaleVal = parseFloat(scale);
      yOffset = parseInt(y);
      if (live2dModel) {
        live2dModel.scale.set(scaleVal);
        live2dModel.x = window.innerWidth / 2 - (live2dModel.width / 2);
        live2dModel.y = yOffset;
      }
    }

    // Toggle Prompt Input Box
    const promptContainer = document.getElementById('prompt-container');
    const promptInput = document.getElementById('prompt-input');
    const promptToggleBtn = document.getElementById('prompt-toggle-btn');
    const promptSendBtn = document.getElementById('prompt-send-btn');

    function togglePromptBox() {
      if (!promptContainer) return;
      if (promptContainer.classList.contains('visible')) {
        promptContainer.classList.remove('visible');
        promptContainer.classList.add('hiding');
        if (promptToggleBtn) promptToggleBtn.classList.remove('active');
        // Wait for slide-down animation to complete before display: none
        setTimeout(() => {
          if (promptContainer.classList.contains('hiding')) {
            promptContainer.style.display = 'none';
          }
        }, 250);
      } else {
        promptContainer.style.display = 'block';
        // Trigger reflow to ensure slide-up animation runs smoothly
        promptContainer.offsetHeight;
        promptContainer.classList.remove('hiding');
        promptContainer.classList.add('visible');
        if (promptToggleBtn) promptToggleBtn.classList.add('active');
        promptInput.focus();
      }
    }

    function sendTextPrompt() {
      if (!promptInput) return;
      const text = promptInput.value.trim();
      if (!text) return;
      
      // Call pywebview Exposed API
      if (window.pywebview && window.pywebview.api && window.pywebview.api.send_text) {
        window.pywebview.api.send_text(text);
      } else {
        console.warn("[JS] window.pywebview.api.send_text not found");
      }
      
      promptInput.value = "";
    }

    if (promptToggleBtn) {
      promptToggleBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Avoid dragging triggers
        togglePromptBox();
      });
    }

    if (promptSendBtn) {
      promptSendBtn.addEventListener('click', sendTextPrompt);
    }

    if (promptInput) {
      promptInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          sendTextPrompt();
        }
      });
      // Prevent drag region from swallowing input events
      promptInput.addEventListener('mousedown', (e) => e.stopPropagation());
    }

    window.openLargeImagePreview = function(url, title, resolution) {
      const preview = document.getElementById('large-image-preview');
      const img = document.getElementById('large-image-img');
      const titleEl = document.getElementById('large-image-title');
      const resEl = document.getElementById('large-image-resolution');
      
      if (!preview || !img) return;
      
      img.src = url;
      img.onerror = function() {
        this.src = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&auto=format&fit=crop';
      };
      
      if (titleEl) titleEl.textContent = title ? `PREVIEW: ${title.toUpperCase()}` : "VISUAL_PREVIEW";
      if (resEl) resEl.textContent = resolution || "AUTO_RESOLVE";
      
      preview.style.display = 'block';
      // Reflow
      preview.offsetHeight;
      preview.classList.add('visible');
    };

    window.closeLargeImagePreview = function() {
      const preview = document.getElementById('large-image-preview');
      if (!preview) return;
      preview.classList.remove('visible');
      setTimeout(() => {
        if (!preview.classList.contains('visible')) {
          preview.style.display = 'none';
        }
      }, 300);
    };

    init();
  </script>
</body>
</html>
