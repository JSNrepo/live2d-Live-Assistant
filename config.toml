[models]
live = "gemini-3.1-flash-live-preview"
task = "gemini-3.1-flash-lite"
vision = "gemini-3.1-flash-lite"

[audio]
send_rate = 16000
recv_rate = 24000
chunk = 1024

[persona]
persona_file = "personac.txt"

[live2d]
enabled = true
width = 950
height = 700
scale = 0.25
y_offset = -20

[barge_in]
enabled = true
threshold = 80.0
feedback_ratio = 0.0  # Set to 0.0 for headphones (instant interruption) or 0.1-0.2 for speakers
